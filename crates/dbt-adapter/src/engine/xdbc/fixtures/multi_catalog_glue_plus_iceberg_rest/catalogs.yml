# Scenario: Two catalogs of different types, no DuckLake.
# Exercises: emission order preserved; NO `INSTALL ducklake` prelude.
catalogs:
  - name: aws_glue
    type: glue
    table_format: iceberg
    config:
      duckdb:
        endpoint_type: GLUE
        attach_as: aws_glue
  - name: rest_demo
    type: iceberg_rest
    table_format: iceberg
    config:
      duckdb:
        warehouse: "demo_warehouse"
        attach_as: "rest_demo"
